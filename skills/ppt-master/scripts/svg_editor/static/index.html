<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPT Master - SVG Editor</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div id="app">
        <div id="panel-left">
            <div class="panel-header">幻灯片</div>
            <div id="slide-list"></div>
        </div>
        <div id="panel-center">
            <div id="svg-container">
                <div id="svg-placeholder">选择左侧幻灯片开始编辑</div>
                <div id="svg-content" style="display:none;"></div>
            </div>
        </div>
        <div id="panel-right">
            <div class="panel-header">批注面板</div>
            <div id="selection-info">
                <div class="section-label">当前选中</div>
                <div id="selected-element" class="empty">点击 SVG 元素进行选择</div>
            </div>
            <div id="annotation-input" style="display:none;">
                <div class="section-label">修改指令</div>
                <textarea id="annotation-text" placeholder="描述你希望 AI 如何修改这个元素..."></textarea>
                <button id="btn-add-annotation">添加标注</button>
            </div>
            <div id="annotation-list">
                <div class="section-label">本页标注</div>
                <div id="annotations"></div>
            </div>
            <button id="btn-save" class="btn-save">保存所有标注到 SVG</button>
        </div>
    </div>
    <div id="modal-overlay" style="display:none;">
        <div id="modal">
            <div id="modal-message"></div>
            <div id="modal-buttons">
                <button id="modal-confirm">确认提交</button>
                <button id="modal-cancel">取消</button>
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
